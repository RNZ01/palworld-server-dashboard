name: Feature request
description: Suggest an improvement, workflow, or new capability
title: "[Feature]: "
labels:
  - enhancement
assignees:
  - RNZ01
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.

        Good feature requests explain the problem first, then the proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      placeholder: It is hard to tell when scheduled restart announcements are still active.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      placeholder: Add a visible restart schedule timeline with cancel controls and status updates.
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Why would this be useful?
      placeholder: This would help server admins avoid duplicate announcements and reduce mistakes during maintenance windows.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Connection / login
        - API proxy
        - Dashboard overview
        - Player management
        - Server controls
        - Metrics
        - Live map
        - UI / styling
        - Documentation
        - Build / tooling
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional
      placeholder: I currently do this manually with direct API calls.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, examples, references, or related projects are welcome.
